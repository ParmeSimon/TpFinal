services:
  postgres:
    image: postgres:17
    container_name: tp_final
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5442:5432"
    volumes:
      - postgres_data_tp_final:/var/lib/postgresql/data


  backend:
    build: ./backend
    container_name: tp_final_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      PORT: 8080
      UPLOAD_DIR: /app/uploads
      TZ: Europe/Paris
    ports:
      - "8080:8080"
    volumes:
      # Persiste les fichiers uploadés (avatars, photos & documents de salles)
      # entre les redémarrages/reconstructions du conteneur.
      - uploads_tp_final:/app/uploads

volumes:
  postgres_data_tp_final:
  uploads_tp_final: