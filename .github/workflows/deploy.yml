name: Build & Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/parmesimon/tpfinal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

#      - name: mvn test
#        run: ./mvnw -B test
#
      - name: mvn package
        run: ./mvnw -B package -DskipTests

      - name: login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker build & push
        run: |
          IMAGE_LC=$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')
          docker build -t "$IMAGE_LC:latest" .
          docker push "$IMAGE_LC:latest"
      - name: Trigger Render Deploy Hook
        run: curl -fsSL -X POST "${{secrets.RENDER_DEPLOY_HOOK }}"