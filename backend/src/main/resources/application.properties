spring.application.name=TpFinal

# Port d'écoute : Render fournit la variable PORT ; en local on retombe sur 8080.
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Origines CORS autorisees : localhost en dev, surcharge via CORS_ALLOWED_ORIGINS en prod
# (ex: https://tpfinal-oduf.onrender.com). Liste separee par des virgules.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# Stockage des fichiers uploadés (avatars, photos & documents de salles).
# Dossier local, monté en volume Docker pour persister (cf. docker-compose / Dockerfile).
app.upload.dir=${UPLOAD_DIR:uploads}

# Limites d'upload (un PDF de consignes ou une photo HD peuvent dépasser le défaut de 1 Mo).
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB